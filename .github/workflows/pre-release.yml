name: Pre-Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0). Leave empty to use the version already in package.json.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ── Tests (gate for all build jobs) ──────────────────────────────
  # 跑一次 ubuntu 即可：测试是平台无关的纯函数 + 协议解析。
  # build-desktop / build-android 都 needs: test —— 失败时不浪费 runner。
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # cargo test 会编译整个 crate（含 wry / tauri）。复用 build-desktop
      # linux 的同款 system deps，否则 webkit2gtk 链接失败。
      - run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Frontend tests (vitest)
        run: npm test

      - name: Backend tests (cargo)
        working-directory: src-tauri
        run: cargo test

  build-desktop:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            target: aarch64-apple-darwin
            name: macos-aarch64
          - os: macos-14
            target: x86_64-apple-darwin
            name: macos-x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev

      # Sync version across the three manifests (package.json /
      # tauri.conf.json / Cargo.toml). Pattern lifted from release.yml
      # — Cargo.toml MUST be updated too, otherwise some bundle metadata
      # ends up at the stale version. Ephemeral: runner-only, no commit.
      - name: Sync version
        id: ver
        shell: bash
        run: |
          INPUT="${{ github.event.inputs.version }}"
          if [ -n "$INPUT" ]; then
            # Reject anything that isn't a semver-shaped tag — input goes
            # straight into sed and $GITHUB_OUTPUT, so a stray newline /
            # slash / shell-meta would corrupt manifests or step outputs.
            if [[ ! "$INPUT" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9.+-]+)?$ ]]; then
              echo "::error::Invalid version '$INPUT' — expected semver (e.g. 1.0.0 or 1.0.0-rc.1)"
              exit 1
            fi
            VERSION="$INPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          npm version "${VERSION}" --no-git-tag-version --allow-same-version
          cd src-tauri
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" tauri.conf.json && rm -f tauri.conf.json.bak
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml && rm -f Cargo.toml.bak
          cd ..
          echo "v=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build CLI
        working-directory: src-tauri
        run: cargo build --release --features cli --bin rssh-cli --target ${{ matrix.target }}

      - name: Stage CLI for bundling
        shell: bash
        run: |
          mkdir -p src-tauri/bin
          NAME="rssh-cli"
          if [[ "${{ matrix.target }}" == *windows* ]]; then NAME="rssh-cli.exe"; fi
          cp "src-tauri/target/${{ matrix.target }}/release/${NAME}" src-tauri/bin/

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}
        env:
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && '-' || '' }}

      # Rename to the same `rssh-<version>-<os>-<arch>.<ext>` convention as
      # release.yml so users get identical filenames whether they grab a
      # pre-release or a final release.
      - name: Rename artifacts
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.v }}"
          PREFIX="rssh-${VERSION}-${{ matrix.name }}"
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle"
          mkdir -p dist
          for f in "${BUNDLE}"/dmg/*.dmg;             do [ -f "$f" ] && cp "$f" "dist/${PREFIX}.dmg";       done
          for f in "${BUNDLE}"/deb/*.deb;             do [ -f "$f" ] && cp "$f" "dist/${PREFIX}.deb";       done
          for f in "${BUNDLE}"/rpm/*.rpm;             do [ -f "$f" ] && cp "$f" "dist/${PREFIX}.rpm";       done
          for f in "${BUNDLE}"/appimage/*.AppImage;   do [ -f "$f" ] && cp "$f" "dist/${PREFIX}.AppImage";  done
          for f in "${BUNDLE}"/msi/*.msi;             do [ -f "$f" ] && cp "$f" "dist/${PREFIX}.msi";       done
          for f in "${BUNDLE}"/nsis/*-setup.exe;      do [ -f "$f" ] && cp "$f" "dist/${PREFIX}-setup.exe"; done
          ls -lh dist/

      # 解压即可用版：跟 release.yml 同一步，pre-release 也产出免安装 zip。
      # 唯一差异是版本号来源（steps.ver.outputs.v，而非 release 的 tag）。
      # 文件名用 matrix.name（windows-x86_64）跟上面 Rename 一致，产出
      # rssh-<ver>-windows-x86_64-portable.zip，与正式 release 完全同名。
      - name: Build Windows portable zip
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.v }}"
          PORTABLE="rssh-${VERSION}-${{ matrix.name }}-portable"
          REL="src-tauri/target/${{ matrix.target }}/release"
          mkdir -p "${PORTABLE}"
          cp "${REL}/rssh.exe" "${PORTABLE}/"
          cp "${REL}/rssh-cli.exe" "${PORTABLE}/"
          cat > "${PORTABLE}/README.txt" <<'EOF'
          RSSH portable for Windows x86_64
          --------------------------------
          Just unzip and run rssh.exe — no installation needed.
          rssh-cli.exe is the CLI binary; add this folder to PATH if you want
          to use `rssh` from any terminal.

          WebView2 Runtime requirement:
            - Windows 11 / Windows 10 1803+ : built-in, ready to go.
            - Older / stripped Windows      : install WebView2 Runtime first:
              https://developer.microsoft.com/microsoft-edge/webview2/

          User data is stored under %USERPROFILE%\.rssh (same as installed
          builds — portable here means "no installer", not "fully isolated").
          EOF
          7z a "dist/${PORTABLE}.zip" "${PORTABLE}/"
          ls -lh dist/

      # ── JetBrains plugin (per-OS: bundles THIS target's rssh-server) ──
      # The plugin embeds a native rssh-server, so one zip is platform-specific;
      # each matrix leg produces rssh-<ver>-<os-arch>-jetbrains-plugin.zip.
      # CI has no local IDE, so build.gradle downloads the 2024.2 SDK (the
      # sinceBuild floor, JBR 21) via -PrsshIdeVersion.
      - name: Set up JDK 21 (JetBrains plugin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build rssh-server (for plugin)
        working-directory: src-tauri
        run: cargo build --release --features server --bin rssh-server --target ${{ matrix.target }}

      - name: Build JetBrains plugin
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.v }}"
          BIN="rssh-server"
          [[ "${{ matrix.target }}" == *windows* ]] && BIN="rssh-server.exe"
          SRV="$(pwd)/src-tauri/target/${{ matrix.target }}/release/${BIN}"
          chmod +x idea-plugin/gradlew || true
          (cd idea-plugin && ./gradlew --no-daemon clean buildPlugin \
            -PrsshIdeVersion=2024.2 \
            -PrsshServerBin="${SRV}")
          mkdir -p dist
          cp idea-plugin/build/distributions/*.zip \
            "dist/rssh-${VERSION}-${{ matrix.name }}-jetbrains-plugin.zip"
          ls -lh dist/

      # 走 Release Assets（Fastly）而不是 Actions Artifacts（Azure Blob + zip
      # 包装），下载速度差一个数量级。draft + prerelease 跟 release.yml 一致：
      # 自动上传到 draft release，由人工 publish。多个 job 共享同一 tag，
      # softprops 会自动把文件 append 到同一 release（不会创建多个）。
      - name: Upload to pre-release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          tag_name: v${{ steps.ver.outputs.v }}
          name: "RSSH v${{ steps.ver.outputs.v }}"
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi

      # Same as desktop job, but Linux runner so plain `sed -i` (no .bak).
      - name: Sync version
        id: ver
        shell: bash
        run: |
          INPUT="${{ github.event.inputs.version }}"
          if [ -n "$INPUT" ]; then
            # Reject anything that isn't a semver-shaped tag — input goes
            # straight into sed and $GITHUB_OUTPUT, so a stray newline /
            # slash / shell-meta would corrupt manifests or step outputs.
            if [[ ! "$INPUT" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9.+-]+)?$ ]]; then
              echo "::error::Invalid version '$INPUT' — expected semver (e.g. 1.0.0 or 1.0.0-rc.1)"
              exit 1
            fi
            VERSION="$INPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          npm version "${VERSION}" --no-git-tag-version --allow-same-version
          cd src-tauri
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" tauri.conf.json
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          cd ..
          echo "v=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/release.jks
          printf 'storeFile=release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            "${{ secrets.ANDROID_KEY_ALIAS }}" \
            "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            > src-tauri/gen/android/key.properties

      - name: Build Android APK
        run: npx tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Rename APK
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.v }}"
          mkdir -p dist
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' -type f | head -1)
          cp "$APK" "dist/rssh-${VERSION}-android-universal.apk"
          ls -lh dist/

      - name: Upload to pre-release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          tag_name: v${{ steps.ver.outputs.v }}
          name: "RSSH v${{ steps.ver.outputs.v }}"
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
