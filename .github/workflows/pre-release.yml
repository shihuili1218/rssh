name: Pre-Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0). Leave empty to use the version already in package.json.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  # ── Tests (gate for all build jobs) ──────────────────────────────
  # 跑一次 ubuntu 即可：测试是平台无关的纯函数 + 协议解析。
  # build-desktop / build-android 都 needs: test —— 失败时不浪费 runner。
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # cargo test 会编译整个 crate（含 wry / tauri）。复用 build-desktop
      # linux 的同款 system deps，否则 webkit2gtk 链接失败。
      - run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Frontend tests (vitest)
        run: npm test

      - name: Backend tests (cargo)
        working-directory: src-tauri
        run: cargo test

  build-desktop:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-aarch64
          - os: macos-14
            target: x86_64-apple-darwin
            name: macos-x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev

      # Sync version across the three manifests (package.json /
      # tauri.conf.json / Cargo.toml). Pattern lifted from release.yml
      # — Cargo.toml MUST be updated too, otherwise some bundle metadata
      # ends up at the stale version. Ephemeral: runner-only, no commit.
      - name: Sync version
        id: ver
        shell: bash
        run: |
          INPUT="${{ github.event.inputs.version }}"
          if [ -n "$INPUT" ]; then
            # Reject anything that isn't a semver-shaped tag — input goes
            # straight into sed and $GITHUB_OUTPUT, so a stray newline /
            # slash / shell-meta would corrupt manifests or step outputs.
            if [[ ! "$INPUT" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9.+-]+)?$ ]]; then
              echo "::error::Invalid version '$INPUT' — expected semver (e.g. 1.0.0 or 1.0.0-rc.1)"
              exit 1
            fi
            VERSION="$INPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          npm version "${VERSION}" --no-git-tag-version --allow-same-version
          cd src-tauri
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" tauri.conf.json && rm -f tauri.conf.json.bak
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml && rm -f Cargo.toml.bak
          cd ..
          echo "v=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build CLI
        working-directory: src-tauri
        run: cargo build --release --features cli --bin rssh-cli --target ${{ matrix.target }}

      - name: Stage CLI for bundling
        shell: bash
        run: |
          mkdir -p src-tauri/bin
          NAME="rssh-cli"
          if [[ "${{ matrix.target }}" == *windows* ]]; then NAME="rssh-cli.exe"; fi
          cp "src-tauri/target/${{ matrix.target }}/release/${NAME}" src-tauri/bin/

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}
        env:
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && '-' || '' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rssh-${{ steps.ver.outputs.v }}-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi

      # Same as desktop job, but Linux runner so plain `sed -i` (no .bak).
      - name: Sync version
        id: ver
        shell: bash
        run: |
          INPUT="${{ github.event.inputs.version }}"
          if [ -n "$INPUT" ]; then
            # Reject anything that isn't a semver-shaped tag — input goes
            # straight into sed and $GITHUB_OUTPUT, so a stray newline /
            # slash / shell-meta would corrupt manifests or step outputs.
            if [[ ! "$INPUT" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9.+-]+)?$ ]]; then
              echo "::error::Invalid version '$INPUT' — expected semver (e.g. 1.0.0 or 1.0.0-rc.1)"
              exit 1
            fi
            VERSION="$INPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          npm version "${VERSION}" --no-git-tag-version --allow-same-version
          cd src-tauri
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" tauri.conf.json
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          cd ..
          echo "v=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/release.jks
          printf 'storeFile=release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            "${{ secrets.ANDROID_KEY_ALIAS }}" \
            "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            > src-tauri/gen/android/key.properties

      - name: Build Android APK
        run: npx tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rssh-${{ steps.ver.outputs.v }}-android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
