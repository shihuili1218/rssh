name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ── Tests (gate for all build jobs) ──────────────────────────────
  # 跑一次 ubuntu 即可：测试是平台无关的纯函数 + 协议解析。
  # build-desktop / build-android 都 needs: test —— 失败时不浪费 runner。
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # cargo test 会编译整个 crate（含 wry / tauri）。复用 build-desktop
      # linux 的同款 system deps，否则 webkit2gtk 链接失败。
      - run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Frontend tests (vitest)
        run: npm test

      - name: Backend tests (cargo)
        working-directory: src-tauri
        run: cargo test

  # ── Desktop (macOS / Linux / Windows) ────────────────────────────
  build-desktop:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            os_name: macos
            arch: aarch64
          - os: macos-14
            target: x86_64-apple-darwin
            os_name: macos
            arch: x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            os_name: linux
            arch: x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows
            arch: x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version
          cd src-tauri
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" tauri.conf.json && rm -f tauri.conf.json.bak
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml && rm -f Cargo.toml.bak

      - name: Build CLI
        working-directory: src-tauri
        run: cargo build --release --features cli --bin rssh-cli --target ${{ matrix.target }}

      - name: Stage CLI for bundling
        shell: bash
        run: |
          mkdir -p src-tauri/bin
          NAME="rssh-cli"
          if [[ "${{ matrix.target }}" == *windows* ]]; then NAME="rssh-cli.exe"; fi
          cp "src-tauri/target/${{ matrix.target }}/release/${NAME}" src-tauri/bin/

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}
        env:
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && '-' || '' }}

      - name: Rename artifacts
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PREFIX="rssh-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}"
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle"
          mkdir -p dist

          for f in "${BUNDLE}"/dmg/*.dmg;            do [ -f "$f" ] && cp "$f" "dist/${PREFIX}.dmg";       done
          for f in "${BUNDLE}"/deb/*.deb;             do [ -f "$f" ] && cp "$f" "dist/${PREFIX}.deb";       done
          for f in "${BUNDLE}"/rpm/*.rpm;              do [ -f "$f" ] && cp "$f" "dist/${PREFIX}.rpm";       done
          for f in "${BUNDLE}"/appimage/*.AppImage;    do [ -f "$f" ] && cp "$f" "dist/${PREFIX}.AppImage";  done
          for f in "${BUNDLE}"/msi/*.msi;              do [ -f "$f" ] && cp "$f" "dist/${PREFIX}.msi";       done
          for f in "${BUNDLE}"/nsis/*-setup.exe;       do [ -f "$f" ] && cp "$f" "dist/${PREFIX}-setup.exe"; done

          ls -lh dist/

      # 解压即可用版（用户反馈）：Tauri build 出的 rssh.exe 本身 standalone，
      # 只是 release 默认不发它，加这步把 GUI + CLI 一起打 zip。共享 WebView2
      # Runtime（Win10 1803+ / Win11 系统自带），老系统按 README.txt 提示自行
      # 安装 ~150MB 的 Microsoft 官方组件。
      - name: Build Windows portable zip
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PORTABLE="rssh-${VERSION}-windows-x86_64-portable"
          REL="src-tauri/target/${{ matrix.target }}/release"
          mkdir -p "${PORTABLE}"
          cp "${REL}/rssh.exe" "${PORTABLE}/"
          cp "${REL}/rssh-cli.exe" "${PORTABLE}/"
          cat > "${PORTABLE}/README.txt" <<'EOF'
          RSSH portable for Windows x86_64
          --------------------------------
          Just unzip and run rssh.exe — no installation needed.
          rssh-cli.exe is the CLI binary; add this folder to PATH if you want
          to use `rssh` from any terminal.

          WebView2 Runtime requirement:
            - Windows 11 / Windows 10 1803+ : built-in, ready to go.
            - Older / stripped Windows      : install WebView2 Runtime first:
              https://developer.microsoft.com/microsoft-edge/webview2/

          User data is stored under %USERPROFILE%\.rssh (same as installed
          builds — portable here means "no installer", not "fully isolated").
          EOF
          7z a "dist/${PORTABLE}.zip" "${PORTABLE}/"
          ls -lh dist/

      # ── JetBrains plugin (per-OS: bundles THIS target's rssh-server) ──
      # The plugin embeds a native rssh-server, so one zip is platform-specific;
      # each matrix leg produces rssh-<ver>-<os>-<arch>-jetbrains-plugin.zip.
      # CI has no local IDE, so build.gradle downloads the 2024.2 SDK (the
      # sinceBuild floor, JBR 21) via -PrsshIdeVersion.
      - name: Set up JDK 21 (JetBrains plugin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build rssh-server (for plugin)
        working-directory: src-tauri
        run: cargo build --release --features server --bin rssh-server --target ${{ matrix.target }}

      - name: Build JetBrains plugin
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BIN="rssh-server"
          [[ "${{ matrix.target }}" == *windows* ]] && BIN="rssh-server.exe"
          SRV="$(pwd)/src-tauri/target/${{ matrix.target }}/release/${BIN}"
          chmod +x idea-plugin/gradlew || true
          (cd idea-plugin && ./gradlew --no-daemon clean buildPlugin \
            -PrsshIdeVersion=2024.2 \
            -PrsshServerBin="${SRV}")
          mkdir -p dist
          cp idea-plugin/build/distributions/*.zip \
            "dist/rssh-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}-jetbrains-plugin.zip"
          ls -lh dist/

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "RSSH ${{ github.ref_name }}"
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Android ──────────────────────────────────────────────────────
  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version
          cd src-tauri
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" tauri.conf.json
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Setup signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/release.jks
          printf 'storeFile=release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            "${{ secrets.ANDROID_KEY_ALIAS }}" \
            "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            > src-tauri/gen/android/key.properties

      - name: Build Android APK
        run: npx tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Rename APK
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' -type f | head -1)
          cp "$APK" "dist/rssh-${VERSION}-android-universal.apk"
          ls -lh dist/

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "RSSH ${{ github.ref_name }}"
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
