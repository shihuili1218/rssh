[package]
name = "rssh"
version = "0.1.0"
edition = "2021"
default-run = "rssh"

[lib]
name = "rssh_lib"
crate-type = ["staticlib", "cdylib", "lib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
rusqlite = { version = "0.31", features = ["bundled"] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"
log = "0.4"
env_logger = "0.11"

# SSH
russh = "0.46"
russh-keys = "0.46"
tokio = { version = "1", features = ["sync", "macros", "net", "io-util", "rt"] }
async-trait = "0.1"

# SFTP
russh-sftp = "2"

# HTTP + crypto
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
base64 = "0.22"
sha2 = "0.10"
hmac = "0.12"

# PTY — 桌面平台专用
[target.'cfg(not(target_os = "android"))'.dependencies]
portable-pty = "0.8"

# CLI
[dependencies.clap]
version = "4"
features = ["derive"]
optional = true
[dependencies.rpassword]
version = "7"
optional = true
[dependencies.tempfile]
version = "3"
optional = true

[features]
default = []
cli = ["clap", "rpassword", "tempfile"]
custom-protocol = ["tauri/custom-protocol"]

[[bin]]
name = "rssh"
path = "src/main.rs"

[[bin]]
name = "rssh-cli"
path = "src/bin/rssh.rs"
required-features = ["cli"]
